<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Manager Admin</title>
    <script src="https://unpkg.com/app-info-parser@1.1.4/dist/app-info-parser.js"></script>
    <style>
        :root { --blue: #007aff; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 10px; cursor: pointer; text-align: center; font-weight: bold; color: #888; }
        .tab.active { color: var(--blue); border-bottom: 2px solid var(--blue); }
        .content { display: none; }
        .content.active { display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; border: 1px solid red; padding: 2px 8px; border-radius: 5px; }
        #drop-zone { border: 2px dashed var(--blue); padding: 30px; text-align: center; border-radius: 15px; background: #f0f7ff; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="showTab('upload-tab')">Upload</div>
        <div class="tab" onclick="showTab('admin-tab'); loadFiles();">Admin</div>
    </div>

    <div id="upload-tab" class="content active">
        <input type="password" id="pass-upload" placeholder="Mật khẩu">
        <input type="text" id="name-upload" placeholder="Tên file tùy chỉnh">
        <div id="drop-zone">Nhấn hoặc thả file IPA vào đây</div>
        <input type="file" id="file-input" style="display:none" accept=".ipa">
        <div id="status" style="margin-top:10px; font-size:12px; color:#666"></div>
        <div id="result" style="margin-top:20px; word-break: break-all;"></div>
    </div>

    <div id="admin-tab" class="content">
        <input type="password" id="pass-admin" placeholder="Nhập mật khẩu Admin">
        <button class="btn" onclick="loadFiles()">Đăng nhập & Tải danh sách</button>
        <div id="file-list" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    const API = "https://ipa-manager.ios-khoindvn.workers.dev"; // LINK WORKER CỦA BẠN

    function showTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- LOGIC UPLOAD ---
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        const pass = document.getElementById('pass-upload').value;
        if (!file || !pass) return alert("Thiếu file hoặc mật khẩu!");

        document.getElementById('status').innerText = "Đang xử lý...";
        const parser = new AppInfoParser(file);
        const info = await parser.parse();

        const fd = new FormData();
        fd.append('file', file);
        fd.append('password', pass);
        fd.append('customName', document.getElementById('name-upload').value);
        fd.append('bundleId', info.CFBundleIdentifier);
        fd.append('appName', info.CFBundleDisplayName || info.CFBundleName);
        fd.append('version', info.CFBundleShortVersionString);

        const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
        const data = await res.json();
        
        if (data.link) {
            document.getElementById('result').innerHTML = `
                <b>Link rút gọn:</b><br><input value="${data.link}" readonly onclick="this.select(); document.execCommand('copy'); alert('Đã copy!')">
                <br><a href="${data.link}" style="color:blue">Thử cài đặt</a>
            `;
            document.getElementById('status').innerText = "Thành công!";
        } else {
            alert("Lỗi: " + data.error);
        }
    };

    // --- LOGIC ADMIN ---
    async function loadFiles() {
        const pass = document.getElementById('pass-admin').value;
        if (!pass) return;
        
        const res = await fetch(`${API}/list`, { headers: { "Authorization": pass } });
        if (res.status === 401) return alert("Mật khẩu sai!");
        
        const files = await res.json();
        let html = "";
        files.forEach(f => {
            html += `
                <div class="file-item">
                    <span title="${f.key}">${f.key.substring(0, 20)}...</span>
                    <span class="delete-btn" onclick="deleteFile('${f.key}')">Xóa</span>
                </div>
            `;
        });
        document.getElementById('file-list').innerHTML = html || "Không có file nào.";
    }

    async function deleteFile(name) {
        if (!confirm("Xóa file này?")) return;
        const pass = document.getElementById('pass-admin').value;
        await fetch(`${API}/delete?file=${name}`, { method: 'DELETE', headers: { "Authorization": pass } });
        loadFiles();
    }
</script>
</body>
</html>
