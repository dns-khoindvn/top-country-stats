<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>IPA Uploader</title>
    <script src="https://unpkg.com/app-info-parser@1.1.4/dist/app-info-parser.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        #drop-zone { border: 2px dashed #007aff; padding: 40px; border-radius: 10px; cursor: pointer; color: #007aff; margin-bottom: 20px; }
        .btn { background: #007aff; color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Tạo Link Cài IPA</h2>
        <div id="drop-zone">Nhấn để chọn hoặc kéo thả file .ipa</div>
        <input type="file" id="file-input" style="display:none" accept=".ipa">
        <div id="status"></div>
    </div>

    <script>
        // QUAN TRỌNG: Thay link này bằng link Worker của bạn
        const WORKER_URL = "https://ipa-manager.YOURSUBDOMAIN.workers.dev/upload"; 

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "Đang đọc thông tin IPA...";
            try {
                const parser = new AppInfoParser(file);
                const info = await parser.parse();

                status.innerText = "Đang tải lên Cloudflare...";
                const formData = new FormData();
                formData.append('file', file);
                formData.append('bundleId', info.CFBundleIdentifier);
                formData.append('appName', info.CFBundleDisplayName || info.CFBundleName);
                formData.append('version', info.CFBundleShortVersionString);

                const res = await fetch(WORKER_URL, { method: 'POST', body: formData });
                const data = await res.json();

                status.innerHTML = `<p>Xong! Nhấn nút dưới để cài:</p><a class="btn" href="${data.link}">Cài đặt ngay</a>`;
            } catch (err) {
                status.innerText = "Lỗi: " + err.message;
            }
        };
    </script>
</body>
</html>
